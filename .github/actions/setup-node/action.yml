name: Setup Node
description: Sets up Node.js with npm dependency installation

inputs:
  node-version:
    description: Node.js version to install
    required: true
  working-directory:
    description: Working directory containing the package-lock.json
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Install dependencies
      run: npm ci
      shell: bash
      working-directory: ${{ inputs.working-directory }}
